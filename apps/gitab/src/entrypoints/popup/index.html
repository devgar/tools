<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>giTab Settings</title>
    <link rel="stylesheet" href="./style.css" />
  </head>
  <body>
    <div id="app">
      <h1>giTab</h1>
      <p class="subtitle">GitLab favicon customizer</p>

      <section id="domains-section">
        <h2>GitLab Instances</h2>
        <ul id="domain-list"></ul>

        <div id="add-domain">
          <input
            type="text"
            id="domain-input"
            placeholder="gitlab.example.com"
          />
          <button id="add-btn">Add</button>
        </div>
        <p id="error-msg" class="error" hidden></p>
      </section>
    </div>
    <script type="module" src="./main.ts"></script>
  </body>
</html>
